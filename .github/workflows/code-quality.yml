name: Code Quality

on:
  push:
    branches: [main, development, feature/**, bugfix/**, hotfix/**]
  pull_request:
    branches: [main, master, development]
  workflow_dispatch:

jobs:
  quality:
    uses: ConductionNL/.github/.github/workflows/quality.yml@main
    with:
      app-name: app-template
      php-version: "8.3"
      php-test-versions: '["8.3", "8.4"]'
      nextcloud-test-refs: '["stable31", "stable32"]'
      enable-psalm: true
      enable-phpstan: true
      enable-phpmetrics: false
      enable-frontend: true
      enable-eslint: true
      enable-phpunit: true
      enable-newman: false
      enable-playwright: true
      playwright-test-path: tests/e2e
      playwright-seed-command: "php occ app:disable app-template && php occ app:enable app-template"
      additional-apps: '[{"repo":"ConductionNL/openregister","app":"openregister","ref":"main"}]'
      enable-sbom: true
